  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get("p");
      var hash = params.get("hash");
      if (p) {
        var url =
          window.location.pathname.replace(/\/$/, "") +
          (p.startsWith("/") ? p : "/" + p);
        if (hash) url += "#" + hash;
        // Replace current history entry so the ?p= never appears in the address bar
        window.history.replaceState(null, null, url);
      }
    })();
  </script>
